name: Generate GitHub Trophies

on:
  schedule:
    - cron: '0 0 * * *'  # daily at midnight
  workflow_dispatch:      # allows manual trigger

jobs:
  generate-trophies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install github-profile-trophy
        run: npm install -g github-profile-trophy

      - name: Generate Trophies
        run: |
          mkdir -p assets/trophies
          github-profile-trophy \
            --username umarxdev1 \
            --theme nord \
            --output assets/trophies

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/trophies/
          git commit -m "Update GitHub trophies [skip ci]" || echo "No changes"
          git push
