name: Update Trophies
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fetch Trophy SVG
        run: |
          mkdir -p assets
          curl -o assets/trophies.svg "https://github-profile-trophy.vercel.app/?username=umarxdev1&theme=nord&no-frame=true&row=1&column=7"
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/trophies.svg
          git commit -m "Update trophies [skip ci]" || echo "No changes"
          git push
